name: TAPD Dashboard Auto Sync

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch TAPD data
        run: python3 tapd/scripts/fetch_tapd.py
        env:
          TAPD_TOKEN: ${{ secrets.TAPD_TOKEN }}

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet tapd/tapd_data.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and Push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TOTAL=$(python3 -c "import json; print(json.load(open('tapd/tapd_data.json'))['meta']['total'])")
          git add tapd/tapd_data.json
          git commit -m "auto: TAPD 갱신 (${TOTAL}건)"
          git push
